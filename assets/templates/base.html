<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Canvas reset ────────────────────────────────────────────────
   render_image.py sets viewport=480×800.
   100vw/100vh = exactly 480×800 in Playwright.
   In a browser the page fills the whole window.
   The !important block beats Water/Pico/MVP default body styles. */
html {
  margin: 0 !important;
  padding: 0 !important;
}
body {
  width: 100vw !important;
  height: 100vh !important;
  max-width: none !important;
  min-height: 0 !important;
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;
  background: #fff;
  color: #000;
  font-family: 'MiSans', 'Noto Serif SC', serif;
  font-size: 32px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

/* ── Color tokens ── */
:root {
  --black:     #000000;
  --dark:      #222222;
  --mid:       #555555;
  --light:     #aeadad;
  --white:     #ffffff;
  --bg-subtle: #f5f5f5;
  --border:    #bbbbbb;
  --sans:  'MiSans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --serif: 'Noto Serif SC', 'SimSun', serif;
  --mono:  'Space Mono', 'Courier New', monospace;
}
</style>
</head>
<body>
<!-- 在这里写内容。.shell/.page 容器用 width:100%; height:100% 继承画布大小。 -->
</body>
</html>
