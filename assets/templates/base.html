<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
/* ── Reset ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Browser preview frame ──────────────────────────
   html fills the browser window with a gray background
   so the 480×800 canvas boundary is clearly visible.
   In Playwright (viewport=480×800), html is exactly
   480×800 and body starts at (0,0) — clip still works. */
html {
  background: #c0c0c0;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
}

/* ── Canvas: 480×800 ────────────────────────────────
   render_image.py sets viewport=480×800 and clips
   from (0,0). Do NOT change width/height/overflow.  */
body {
  width: 480px;
  height: 800px;
  overflow: hidden;
  flex-shrink: 0;
  background: #fff;
  color: #000;
  font-family: 'MiSans', 'Noto Serif SC', serif;
  font-size: 32px;      /* 正文基准：墨水屏宜大不宜小 */
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

/* ── Color tokens (grayscale only) ──────────────────
   Use these or write your own values.
   Everything is converted to 4-level gray on device. */
:root {
  --black:      #000000;
  --dark:       #222222;
  --mid:        #555555;
  --light:      #aeadad;
  --white:      #ffffff;
  --bg-subtle:  #f5f5f5;
  --border:     #bbbbbb;
}

/* ── Font stacks ────────────────────────────────────
   render_image.py injects local MiSans + Noto Serif SC.
   Falls back to Google Fonts CDN if local files absent. */
:root {
  --sans:  'MiSans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --serif: 'Noto Serif SC', 'SimSun', serif;
  --mono:  'Space Mono', 'Courier New', monospace;
}
</style>
</head>
<body>
<!-- Write anything here. 480×800. No constraints beyond that. -->
</body>
</html>
