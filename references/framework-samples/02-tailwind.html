<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>什么是AI · 弯当格 · Tailwind</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { fontFamily: { sans: ["MiSans","PingFang SC","Microsoft YaHei","sans-serif"] } } }
};
</script>
<style>
html { background: #c0c0c0; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
</style>
</head>
<!-- ── 弯当格 Bento Grid: 大小格瓷砖拼版 · 部分填黑 ── -->
<body class="w-[480px] h-[800px] overflow-hidden flex-shrink-0 bg-white text-black font-sans">
<div class="h-full flex flex-col p-2.5 gap-2">

  <!-- topbar -->
  <div class="flex justify-between items-center border-b-[2.5px] border-black pb-2 shrink-0
              text-[20px] font-bold tracking-[0.1em] uppercase">
    <span>知识卡</span>
    <span class="border-[2.5px] border-black px-3 py-0.5 text-[17px] shadow-[3px_3px_0_#000]
                 tracking-normal normal-case">Tailwind</span>
    <span>入门</span>
  </div>

  <!-- bento grid -->
  <div class="flex-1 grid gap-2 min-h-0"
       style="grid-template-columns:1fr 130px;
              grid-template-rows:1fr 1fr 1fr auto auto;">

    <!-- 主格：标题，横跨3行 -->
    <div class="row-span-3 border-[3px] border-black rounded-xl p-4
                flex flex-col justify-between">
      <div>
        <div class="text-[17px] font-bold tracking-[0.2em] text-[#555] uppercase mb-2">WHAT IS</div>
        <h1 class="text-[46px] font-black leading-none text-black">什么是<br>人工智能？</h1>
      </div>
      <p class="text-[26px] text-[#222] leading-snug">一屏速览<br>Bento 栅格</p>
    </div>

    <!-- 概念格 · 黑 -->
    <div class="border-[3px] border-black rounded-xl bg-black text-white
                flex flex-col justify-center items-center text-center p-2">
      <div class="text-[28px] font-black leading-none">数据</div>
      <div class="text-[21px] mt-1.5 opacity-80">喂例子</div>
    </div>
    <!-- 概念格 · 白 -->
    <div class="border-[3px] border-black rounded-xl
                flex flex-col justify-center items-center text-center p-2">
      <div class="text-[28px] font-black leading-none">模型</div>
      <div class="text-[21px] mt-1.5 text-[#222]">找映射</div>
    </div>
    <!-- 概念格 · 灰底 -->
    <div class="border-[3px] border-black rounded-xl bg-[#ebebeb]
                flex flex-col justify-center items-center text-center p-2">
      <div class="text-[28px] font-black leading-none">输出</div>
      <div class="text-[21px] mt-1.5 text-[#222]">判/猜/写</div>
    </div>

    <!-- 定义格：全宽 -->
    <div class="col-span-2 border-[3px] border-black rounded-xl p-4">
      <div class="text-[17px] font-bold tracking-[0.2em] uppercase text-[#555] mb-2">一句话定义</div>
      <p class="text-[28px] font-semibold leading-snug text-black">
        让机器从数据里归纳规律，对新情况能判断、预测或生成内容。
      </p>
    </div>

    <!-- 注释格：两格 -->
    <div class="border-[3px] border-black rounded-xl p-3 flex items-center">
      <p class="text-[24px] text-black leading-snug">≠ 巨型检索库<br>= 可判断的映射</p>
    </div>
    <div class="border-[3px] border-black rounded-xl bg-black text-white
                p-3 flex flex-col justify-center items-center text-center">
      <p class="text-[22px] font-bold leading-snug">长文<br>→ epub</p>
    </div>

  </div>
</div>
</body>
</html>
