<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>什么是AI · 极简海报 · 无框架</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { margin: 0 !important; padding: 0 !important; }
body { width: 100vw !important; height: 100vh !important; max-width: none !important; min-height: 0 !important; overflow: hidden !important; margin: 0 !important; padding: 0 !important; background: #fff; color: #000; font-family: 'MiSans', 'PingFang SC', 'Microsoft YaHei', sans-serif; }

/* ── 极简海报 Minimal Poster: 超大字 · 极少文字 · 留白即设计 ── */
.shell {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  padding: 32px 28px 24px;
}

/* 顶部角标 */
.corner-tag {
  display: flex; justify-content: space-between; align-items: flex-start;
  flex-shrink: 0;
}
.tag-left { font-size: 18px; font-weight: 700; letter-spacing: 0.22em; color: #888; text-transform: uppercase; }
.tag-right { font-size: 18px; font-weight: 700; letter-spacing: 0.14em; color: #888; }

/* 主视觉：超大字母 */
.mega { flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 0; }
.mega-letters {
  font-size: 200px; font-weight: 900; line-height: 0.85;
  color: #000; letter-spacing: -0.06em;
  /* 左侧轻微缩进让视觉居中 */
  margin-left: -8px;
}

/* 水平粗线 */
.rule-thick { height: 6px; background: #000; margin: 20px 0 16px; flex-shrink: 0; }

/* 副标题行 */
.subtitle-row {
  display: flex; justify-content: space-between; align-items: baseline;
  flex-shrink: 0;
}
.subtitle-main { font-size: 36px; font-weight: 900; letter-spacing: 0.06em; color: #000; }
.subtitle-en   { font-size: 22px; font-weight: 700; letter-spacing: 0.18em; color: #666; text-transform: uppercase; }

/* 一句话定义 */
.tagline {
  margin-top: 14px; flex-shrink: 0;
  font-size: 28px; font-weight: 600; line-height: 1.5; color: #222;
  border-left: 5px solid #000; padding-left: 14px;
}

/* 底角信息 */
.bottom-row {
  margin-top: auto; padding-top: 20px; flex-shrink: 0;
  display: flex; justify-content: space-between; align-items: center;
  border-top: 2px solid #ccc;
}
.bottom-label { font-size: 18px; font-weight: 700; letter-spacing: 0.1em; color: #999; text-transform: uppercase; }
.bottom-dot { width: 10px; height: 10px; border-radius: 50%; background: #000; }
</style>
</head>
<body>
<div class="shell">
  <div class="corner-tag">
    <span class="tag-left">知识卡 · 无框架</span>
    <span class="tag-right">入门</span>
  </div>

  <div class="mega">
    <div class="mega-letters">A<br>I</div>
  </div>

  <div class="rule-thick"></div>

  <div class="subtitle-row">
    <span class="subtitle-main">人工智能</span>
    <span class="subtitle-en">Artificial Intelligence</span>
  </div>

  <p class="tagline">不是检索，是映射——<br>机器从数据里学会判断。</p>

  <div class="bottom-row">
    <span class="bottom-label">Minimal Poster sample</span>
    <span class="bottom-dot"></span>
    <span class="bottom-label">2026-03-28</span>
  </div>
</div>
</body>
</html>
