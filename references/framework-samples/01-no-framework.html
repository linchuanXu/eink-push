<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>什么是AI · 野兽派 · 无框架</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html {
  background: #c0c0c0;
  display: flex; justify-content: center; align-items: flex-start;
  min-height: 100vh;
}
body {
  width: 480px; height: 800px; overflow: hidden; flex-shrink: 0;
  background: #fff; color: #000;
  font-family: 'MiSans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
/* ── 野兽派 Brutalism: 厚边框 · 硬阴影 · 黑块反色 ── */
.shell { height: 100%; border: 5px solid #000; display: flex; flex-direction: column; }

.topbar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 14px; border-bottom: 4px solid #000;
  font-size: 20px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  flex-shrink: 0;
}
.badge {
  border: 3px solid #000; padding: 3px 12px; font-size: 18px;
  box-shadow: 3px 3px 0 #000; letter-spacing: 0;
}
.hero {
  padding: 16px 20px 12px; border-bottom: 4px solid #000; flex-shrink: 0;
}
.hero-kicker {
  font-size: 18px; font-weight: 700; letter-spacing: 0.22em; color: #555; margin-bottom: 4px;
}
h1 {
  font-size: 70px; line-height: 0.95; font-weight: 900;
  letter-spacing: -0.03em; color: #000;
}
.hero-strap {
  font-size: 26px; font-weight: 600; color: #222; margin-top: 10px; line-height: 1.3;
}
.black-bar {
  background: #000; color: #fff; flex-shrink: 0;
  padding: 11px 20px; font-size: 30px; font-weight: 700; letter-spacing: 0.05em;
  display: flex; align-items: center; gap: 16px;
}
.black-bar .arr { opacity: 0.65; font-size: 26px; }
.def {
  padding: 14px 18px 16px; border-bottom: 4px solid #000; flex-shrink: 0;
}
.def-label {
  font-size: 17px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
  color: #000; border-bottom: 3px solid #000; padding-bottom: 6px; margin-bottom: 10px;
  display: inline-block;
}
.def-text {
  font-size: 30px; font-weight: 600; line-height: 1.45; color: #000;
}
.grid3 {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  border-bottom: 4px solid #000; flex-shrink: 0;
}
.cell { padding: 12px 8px; border-right: 3px solid #000; text-align: center; }
.cell:last-child { border-right: none; }
.cell-n { font-size: 38px; font-weight: 900; color: #000; line-height: 1; }
.cell-name { font-size: 24px; font-weight: 700; color: #000; margin-top: 3px; }
.cell-hint { font-size: 20px; color: #333; margin-top: 2px; }
.foot {
  padding: 10px 18px; display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0; margin-top: auto;
}
.btn {
  border: 3px solid #000; padding: 7px 18px;
  font-size: 24px; font-weight: 700; letter-spacing: 0.02em;
  box-shadow: 5px 5px 0 #000; color: #000; background: #fff;
}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <span>知识卡</span>
    <span class="badge">无框架</span>
    <span>入门</span>
  </div>
  <div class="hero">
    <div class="hero-kicker">WHAT IS</div>
    <h1>人工<br>智能</h1>
    <p class="hero-strap">一屏速览 · 野兽派 Brutalism</p>
  </div>
  <div class="black-bar">
    <span>数据</span><span class="arr">→</span>
    <span>模型</span><span class="arr">→</span>
    <span>输出</span>
  </div>
  <div class="def">
    <span class="def-label">一句话定义</span>
    <p class="def-text">让机器从数据里归纳规律，对新情况能判断、预测或生成内容。</p>
  </div>
  <div class="grid3">
    <div class="cell">
      <div class="cell-n">01</div>
      <div class="cell-name">数据</div>
      <div class="cell-hint">喂例子</div>
    </div>
    <div class="cell">
      <div class="cell-n">02</div>
      <div class="cell-name">模型</div>
      <div class="cell-hint">找映射</div>
    </div>
    <div class="cell">
      <div class="cell-n">03</div>
      <div class="cell-name">输出</div>
      <div class="cell-hint">判/猜/写</div>
    </div>
  </div>
  <div class="foot">
    <span class="btn">≠ 检索库</span>
    <span class="btn">长文→epub</span>
  </div>
</div>
</body>
</html>
