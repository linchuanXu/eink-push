<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>什么是AI · 信息图 · 无框架</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { margin: 0 !important; padding: 0 !important; }
body { width: 100vw !important; height: 100vh !important; max-width: none !important; min-height: 0 !important; overflow: hidden !important; margin: 0 !important; padding: 0 !important; background: #fff; color: #000; font-family: 'MiSans', 'PingFang SC', 'Microsoft YaHei', sans-serif; }

/* ── 信息图 Infographic: 内联SVG为主体 · 流程图/对比图 · 图文混排 ── */
.shell { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 12px 14px; }

/* 顶栏 */
.topbar { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #000; padding-bottom: 8px; margin-bottom: 8px; flex-shrink: 0; }
.top-title { font-size: 28px; font-weight: 900; letter-spacing: 0.04em; }
.top-badge { border: 2px solid #000; padding: 3px 12px; font-size: 18px; font-weight: 700; }

/* 流程图区（SVG） */
.flow-section { flex-shrink: 0; margin-bottom: 10px; }
.section-label { font-size: 17px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #555; margin-bottom: 6px; }

/* 对比图区 */
.compare-section { flex: 1; min-height: 0; display: flex; flex-direction: column; }
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; flex: 1; min-height: 0; }
.compare-col { display: flex; flex-direction: column; }
.compare-head { background: #000; color: #fff; text-align: center; font-size: 22px; font-weight: 900; padding: 6px; }
.compare-head.light { background: #e0e0e0; color: #000; }
.compare-item { border: 2px solid #ccc; border-top: none; padding: 7px 10px; font-size: 22px; display: flex; gap: 8px; align-items: flex-start; flex: 1; }
.compare-item .icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }

/* 底部标签栏 */
.foot { border-top: 3px solid #000; padding-top: 8px; margin-top: 8px; flex-shrink: 0; display: flex; justify-content: space-between; font-size: 17px; font-weight: 700; color: #555; }
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <span class="top-title">人工智能 · 图解</span>
    <span class="top-badge">Infographic</span>
  </div>

  <!-- 流程图：SVG 内联 -->
  <div class="flow-section">
    <div class="section-label">AI 工作流程</div>
    <svg width="100%" height="110" viewBox="0 0 452 110" xmlns="http://www.w3.org/2000/svg" style="display:block;">
      <!-- 节点1：数据 -->
      <rect x="2" y="20" width="100" height="70" fill="#000" rx="4"/>
      <text x="52" y="52" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="MiSans,PingFang SC,sans-serif">数据</text>
      <text x="52" y="77" text-anchor="middle" fill="#ccc" font-size="18" font-family="MiSans,sans-serif">喂例子</text>

      <!-- 箭头1 -->
      <line x1="102" y1="55" x2="148" y2="55" stroke="#000" stroke-width="3"/>
      <polygon points="148,48 162,55 148,62" fill="#000"/>

      <!-- 节点2：训练 -->
      <rect x="162" y="20" width="100" height="70" fill="#555" rx="4"/>
      <text x="212" y="52" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="MiSans,sans-serif">训练</text>
      <text x="212" y="77" text-anchor="middle" fill="#ddd" font-size="18" font-family="MiSans,sans-serif">找映射</text>

      <!-- 箭头2 -->
      <line x1="262" y1="55" x2="308" y2="55" stroke="#000" stroke-width="3"/>
      <polygon points="308,48 322,55 308,62" fill="#000"/>

      <!-- 节点3：模型 -->
      <rect x="322" y="20" width="100" height="70" fill="#000" rx="4"/>
      <text x="372" y="52" text-anchor="middle" fill="#fff" font-size="22" font-weight="700" font-family="MiSans,sans-serif">模型</text>
      <text x="372" y="77" text-anchor="middle" fill="#ccc" font-size="18" font-family="MiSans,sans-serif">能推理</text>

      <!-- 步骤标号 -->
      <text x="52"  y="14" text-anchor="middle" fill="#000" font-size="16" font-weight="700" font-family="MiSans,sans-serif">① INPUT</text>
      <text x="212" y="14" text-anchor="middle" fill="#555" font-size="16" font-weight="700" font-family="MiSans,sans-serif">② TRAIN</text>
      <text x="372" y="14" text-anchor="middle" fill="#000" font-size="16" font-weight="700" font-family="MiSans,sans-serif">③ OUTPUT</text>
    </svg>
  </div>

  <!-- 对比图：AI vs 传统编程 -->
  <div class="compare-section">
    <div class="section-label">AI vs 传统编程</div>
    <div class="compare-grid">
      <div class="compare-col">
        <div class="compare-head">传统编程</div>
        <div class="compare-item"><span class="icon">→</span><span>输入：数据 + 规则</span></div>
        <div class="compare-item"><span class="icon">→</span><span>输出：答案结果</span></div>
        <div class="compare-item"><span class="icon">✗</span><span>无法处理规则之外的情况</span></div>
      </div>
      <div class="compare-col">
        <div class="compare-head light">机器学习</div>
        <div class="compare-item"><span class="icon">→</span><span>输入：数据 + 答案</span></div>
        <div class="compare-item"><span class="icon">→</span><span>输出：归纳出的规则</span></div>
        <div class="compare-item"><span class="icon">✓</span><span>可泛化至未见过的情况</span></div>
      </div>
    </div>
  </div>

  <div class="foot">
    <span>Infographic sample · 无框架</span>
    <span>2026-03-28</span>
  </div>
</div>
</body>
</html>
