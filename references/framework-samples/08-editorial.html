<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<title>什么是AI · 编辑排版 · Pico.css</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<style>
/* ── 编辑排版 Editorial: 大引言 · 杂志感 · 双栏收束 ── */
html { margin: 0 !important; padding: 0 !important; }
body { width: 100vw !important; height: 100vh !important; max-width: none !important; min-height: 0 !important; overflow: hidden !important; margin: 0 !important; padding: 0 !important; background: #fff !important; color: #000 !important; font-family: 'Noto Serif SC', 'MiSans', serif !important; font-size: 28px; }
main { max-width: none !important; padding: 0 !important; height: 100% !important; }

.page { width: 100%; height: 100%; display: flex; flex-direction: column; }

.topbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 22px; border-bottom: 3px solid #000; font-size: 18px !important; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: #555 !important; flex-shrink: 0; font-family: 'MiSans', sans-serif !important; }
.topbar strong { color: #000; letter-spacing: 0; }

.pullquote { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px 26px; border-bottom: 3px solid #000; min-height: 0; }
.pq-open { font-size: 80px; line-height: 0.6; color: #000; font-weight: 900; margin-bottom: 6px; font-family: Georgia, serif; }
.pq-text { font-size: 36px !important; font-weight: 700 !important; line-height: 1.35 !important; color: #000 !important; margin: 0 !important; }
.pq-close { font-size: 80px; line-height: 0.5; color: #000; font-weight: 900; text-align: right; margin-top: 6px; font-family: Georgia, serif; }
.pq-source { font-size: 22px !important; color: #555 !important; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 14px !important; font-style: normal !important; font-family: 'MiSans', sans-serif !important; }

.infobar { background: #000; color: #fff; flex-shrink: 0; padding: 10px 22px; font-size: 28px; font-weight: 600; display: flex; align-items: center; gap: 12px; font-family: 'MiSans', sans-serif !important; }
.infobar span { opacity: 0.7; font-size: 22px; }

.twocol { display: grid; grid-template-columns: 1fr 1fr; border-top: 3px solid #000; flex-shrink: 0; }
.col { padding: 12px 16px; }
.col:first-child { border-right: 3px solid #000; }
.col-head { font-size: 18px !important; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #555 !important; margin-bottom: 6px !important; font-family: 'MiSans', sans-serif !important; }
.col-body { font-size: 26px !important; color: #000 !important; line-height: 1.5 !important; margin: 0 !important; }

.footer { border-top: 3px solid #000; padding: 8px 22px; display: flex; justify-content: space-between; font-size: 18px !important; color: #555 !important; letter-spacing: 0.12em; text-transform: uppercase; flex-shrink: 0; font-family: 'MiSans', sans-serif !important; }
</style>
</head>
<body>
<main>
<div class="page">
  <div class="topbar"><span>知识卡</span><strong>Pico</strong><span>编辑排版</span></div>
  <div class="pullquote">
    <div class="pq-open">❝</div>
    <p class="pq-text">让机器从数据里<br>归纳规律，对新<br>情况能判断、预<br>测或生成内容。</p>
    <div class="pq-close">❞</div>
    <p class="pq-source">— 人工智能 · 一句话定义</p>
  </div>
  <div class="infobar">
    <span>数据</span><span>→</span><span>模型</span><span>→</span><span>输出</span>
  </div>
  <div class="twocol">
    <div class="col">
      <p class="col-head">速览</p>
      <p class="col-body">什么是人工智能？一屏速览 · Pico 编辑排版样例。</p>
    </div>
    <div class="col">
      <p class="col-head">澄清</p>
      <p class="col-body">≠ 检索库<br>深度内容<br>→ epub</p>
    </div>
  </div>
  <div class="footer"><span>Pico.css sample</span><span>2026-03-28</span></div>
</div>
</main>
</body>
</html>
