<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI发展史 · 时间线 · 无框架</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { margin: 0 !important; padding: 0 !important; }
body { width: 100vw !important; height: 100vh !important; max-width: none !important; min-height: 0 !important; overflow: hidden !important; margin: 0 !important; padding: 0 !important; background: #fff; color: #000; font-family: 'MiSans', 'PingFang SC', 'Microsoft YaHei', sans-serif; }

/* ── 时间线 Timeline: 垂直轴 · 节点 · 日期 · 线性叙事 ── */
.shell { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 0; }

/* 顶栏 */
.topbar { background: #000; color: #fff; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.top-title { font-size: 26px; font-weight: 900; letter-spacing: 0.06em; }
.top-sub   { font-size: 18px; font-weight: 600; opacity: 0.7; letter-spacing: 0.08em; }

/* 时间线容器 */
.timeline { flex: 1; padding: 14px 20px 14px 0; display: flex; flex-direction: column; justify-content: space-between; min-height: 0; position: relative; }

/* 左侧垂直轴线 */
.timeline::before {
  content: ''; position: absolute;
  left: 56px; top: 0; bottom: 0;
  width: 3px; background: #000;
}

/* 单个节点行 */
.tl-row { display: flex; align-items: flex-start; gap: 0; position: relative; }

/* 年份标签 */
.tl-year {
  width: 56px; text-align: right; padding-right: 0;
  font-size: 20px; font-weight: 900; color: #000;
  line-height: 1; padding-top: 3px; flex-shrink: 0;
}

/* 节点圆圈 */
.tl-dot {
  width: 20px; height: 20px; border-radius: 50%;
  border: 3px solid #000; background: #fff;
  flex-shrink: 0; margin-top: 1px;
  position: relative; left: -9px; /* 使圆心落在轴线上 */
  z-index: 1;
}
.tl-dot.filled { background: #000; }
.tl-dot.now { background: #000; width: 24px; height: 24px; left: -11px; border-width: 4px; margin-top: -1px; }

/* 内容卡片 */
.tl-card {
  margin-left: 10px; flex: 1;
  border: 2px solid #000; padding: 8px 12px;
}
.tl-card.highlight { background: #000; color: #fff; }
.tl-event { font-size: 26px; font-weight: 900; line-height: 1.1; }
.tl-desc  { font-size: 21px; color: #444; margin-top: 3px; line-height: 1.35; }
.tl-card.highlight .tl-desc { color: #bbb; }

/* NOW 标签 */
.now-badge {
  display: inline-block; background: #fff; color: #000;
  border: 2px solid #fff; font-size: 16px; font-weight: 700;
  padding: 1px 8px; margin-left: 10px; vertical-align: middle;
  letter-spacing: 0.08em;
}

/* 底栏 */
.foot { border-top: 3px solid #000; padding: 8px 20px; display: flex; justify-content: space-between; font-size: 17px; font-weight: 700; color: #555; flex-shrink: 0; }
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <span class="top-title">人工智能发展史</span>
    <span class="top-sub">Timeline · 无框架</span>
  </div>

  <div class="timeline">
    <div class="tl-row">
      <span class="tl-year">1950</span>
      <div class="tl-dot"></div>
      <div class="tl-card">
        <div class="tl-event">图灵测试提出</div>
        <div class="tl-desc">「机器能思考吗？」—— 艾伦·图灵</div>
      </div>
    </div>

    <div class="tl-row">
      <span class="tl-year">1980</span>
      <div class="tl-dot filled"></div>
      <div class="tl-card">
        <div class="tl-event">专家系统兴起</div>
        <div class="tl-desc">规则驱动的第一代AI，工业大规模应用</div>
      </div>
    </div>

    <div class="tl-row">
      <span class="tl-year">2012</span>
      <div class="tl-dot filled"></div>
      <div class="tl-card">
        <div class="tl-event">深度学习突破</div>
        <div class="tl-desc">ImageNet 竞赛，错误率暴降至16%</div>
      </div>
    </div>

    <div class="tl-row">
      <span class="tl-year">2017</span>
      <div class="tl-dot filled"></div>
      <div class="tl-card">
        <div class="tl-event">Transformer 诞生</div>
        <div class="tl-desc">Attention is All You Need，奠定大模型基础</div>
      </div>
    </div>

    <div class="tl-row">
      <span class="tl-year">2023</span>
      <div class="tl-dot now"></div>
      <div class="tl-card highlight">
        <div class="tl-event">大模型元年 <span class="now-badge">NOW</span></div>
        <div class="tl-desc">GPT-4 · 多模态 · Agent · 本地部署普及</div>
      </div>
    </div>

    <div class="tl-row">
      <span class="tl-year">未来</span>
      <div class="tl-dot"></div>
      <div class="tl-card">
        <div class="tl-event">AGI 探索期？</div>
        <div class="tl-desc">通用人工智能，下一个未知里程碑</div>
      </div>
    </div>
  </div>

  <div class="foot">
    <span>Timeline sample</span>
    <span>知识卡 · 入门</span>
    <span>2026-03-28</span>
  </div>
</div>
</body>
</html>
